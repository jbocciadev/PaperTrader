version: "3.8"

services:

# Market data ingestion layer

market-service:
    build:
        context: "./Market Data Service"
        dockerfile: Dockerfile
    environment:
        - NODE_ENV=production
        - TICKERS=${TICKERS}
        - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIT_REST_URL}
        - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIT_REST_TOKEN}
        - FINNHUB_API_KEY=${FINNHUB_API_KEY}
        - NODE_TLS_REJECT_UNAUTHORIZED=0
    networks:
        - paper-trader-overlay
    restart: on-failure
    # deploy:
    #     restart_policy:
    #         condition: on-failure
    #         delay: 5s
    #         max_attempts: 3

# Trade execution layer

trading-service:
    build:
        context: "./Trading Service Core"
        dockerfile: Dockerfile
    environment:
        - DATABASE_URL=${DATABASE_URL}
        - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
        - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
    networks:
        - paper-trader-overlay
    restart: on-failure
    # deploy:
    #     restart_policy:
    #         condition: on-failure

# FastAPI Web Server (GUI)

web-server:
    build:
        context: "./FastAPI Web Server"
        dockerfile: Dockerfile
    ports:
        - "8000:8000"
    environment:
        - JWT_SECRET=${JWT_SECRET}
        - JWT_ALGORITHM=${JWT_ALGORITHM}
        - TICKERS=${TICKERS}
        - DATABASE_URL=${DATABASE_URL}
        - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
        - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
        - TRADING_SERVICE_URL=trading-service:50051
    networks:
        - paper-trader-overlay
    depends_on:
        - trading-service
    restart: on-failure
    # deploy:
    #     restart_policy:
    #         condition: on-failure

# Network definition

networks:
    paper-trader-overlay:
        driver: bridge
        # driver: overlay
        attachable: true
